<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBLR Choice Tree Editor</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --panel-2: #1a2342;
      --text: #eaf1ff;
      --muted: #98a8cf;
      --border: #33406f;
      --accent: #ffd166;
      --ok: #2ecc71;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #1a2660 0%, var(--bg) 45%);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(11, 16, 32, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.4px;
    }
    .muted { color: var(--muted); }
    .spacer { flex: 1; }
    button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: var(--accent);
      color: #261600;
      border-color: #f4b942;
    }
    main {
      max-width: 1200px;
      margin: 20px auto 40px;
      padding: 0 14px;
      display: grid;
      gap: 16px;
    }
    .card {
      background: rgba(18, 26, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }
    .route {
      margin-top: 10px;
      border-top: 1px dashed var(--border);
      padding-top: 10px;
    }
    .route-title {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .choice {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .choice-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin: 6px 0 4px;
    }
    input, textarea {
      width: 100%;
      background: #0f1630;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px;
      font: inherit;
    }
    textarea { min-height: 70px; resize: vertical; }
    #status {
      font-size: 13px;
      color: var(--muted);
    }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--danger); }
  </style>
</head>
<body>
  <header>
    <h1>DBLR Choice Tree Editor</h1>
    <span class="muted">Public mode: edit and save as browser override + JSON export</span>
    <span class="spacer"></span>
    <button id="import-btn">Import JSON</button>
    <button id="export-btn">Export JSON</button>
    <button id="reload-btn">Reload</button>
    <button id="save-btn" class="primary">Save Override</button>
  </header>

  <input id="import-file" type="file" accept="application/json" style="display:none" />
  <main id="tree-root"></main>

  <script>
    let gameData = null;
    const STORAGE_KEY = "dblr_game_data_override_v1";

    const root = document.getElementById("tree-root");
    const statusEl = document.createElement("div");
    statusEl.id = "status";
    root.before(statusEl);

    function setStatus(text, kind = "") {
      statusEl.textContent = text;
      statusEl.className = kind ? kind : "";
    }

    function escapeHtml(v) {
      return String(v ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function choiceEditorBlock(choice, pathRef, titlePrefix = "") {
      const meta = `${titlePrefix} ${choice.id || "choice"}`.trim();
      return `
        <div class="choice" data-path="${escapeHtml(pathRef)}">
          <div class="choice-meta">${escapeHtml(meta)}</div>
          <label>Choice Text</label>
          <input data-field="text" value="${escapeHtml(choice.text || "")}" />
          <label>Choice Detail</label>
          <textarea data-field="detail">${escapeHtml(choice.detail || "")}</textarea>
        </div>`;
    }

    function renderChoiceRoutes() {
      const eventEntries = Object.entries(gameData.events || {});
      const crisisEntries = Object.entries(gameData.crisis_events || {});

      let html = "";

      html += `<section class="card"><h2>Story & Event Choices</h2>`;
      eventEntries.forEach(([eventId, ev]) => {
        if (!Array.isArray(ev.choices) || ev.choices.length === 0) return;
        html += `<div class="route"><div class="route-title">${escapeHtml(eventId)} · ${escapeHtml(ev.title || "")}</div>`;
        ev.choices.forEach((choice, idx) => {
          html += choiceEditorBlock(choice, `events.${eventId}.choices.${idx}`);
        });
        html += `</div>`;
      });
      html += `</section>`;

      html += `<section class="card"><h2>Crisis Choices</h2>`;
      crisisEntries.forEach(([routeId, ev]) => {
        html += `<div class="route"><div class="route-title">${escapeHtml(routeId)} crisis · ${escapeHtml(ev.title || "")}</div>`;
        (ev.choices || []).forEach((choice, idx) => {
          html += choiceEditorBlock(choice, `crisis_events.${routeId}.choices.${idx}`);
        });
        html += `</div>`;
      });
      html += `</section>`;

      const secret = gameData.secret_choices || {};
      html += `<section class="card"><h2>Secret Wish Choices</h2>`;
      ["wish_goku", "wish_martial_artists"].forEach((key) => {
        const c = secret[key];
        if (!c) return;
        html += `<div class="route"><div class="route-title">${escapeHtml(key)}</div>`;
        html += choiceEditorBlock(c, `secret_choices.${key}`, "secret");
        html += `</div>`;
      });
      html += `</section>`;

      root.innerHTML = html;
      bindInputs();
    }

    function setByPath(obj, path, field, value) {
      const parts = path.split(".");
      let cur = obj;
      for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        const idx = Number.isNaN(Number(p)) ? p : Number(p);
        if (i === parts.length - 1) {
          cur[idx][field] = value;
        } else {
          cur = cur[idx];
        }
      }
    }

    function bindInputs() {
      root.querySelectorAll(".choice").forEach((box) => {
        const path = box.dataset.path;
        box.querySelectorAll("input, textarea").forEach((el) => {
          el.addEventListener("input", () => {
            const field = el.dataset.field;
            setByPath(gameData, path, field, el.value);
          });
        });
      });
    }

    function hasRequiredKeys(data) {
      const required = ["stories", "events", "crisis_events", "endings", "aftermaths", "dragon_balls", "secret_choices"];
      return required.every((k) => Object.prototype.hasOwnProperty.call(data || {}, k));
    }

    async function tryLoadFromApi() {
      const res = await fetch("/api/game-data");
      if (!res.ok) throw new Error(`API load failed (HTTP ${res.status})`);
      const data = await res.json();
      if (!hasRequiredKeys(data)) throw new Error("API data missing required keys");
      return data;
    }

    async function tryLoadFromStaticJson() {
      const res = await fetch("./game_data.json");
      if (!res.ok) throw new Error(`Static JSON load failed (HTTP ${res.status})`);
      const data = await res.json();
      if (!hasRequiredKeys(data)) throw new Error("game_data.json missing required keys");
      return data;
    }

    function tryLoadFromLocalStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        return hasRequiredKeys(data) ? data : null;
      } catch {
        return null;
      }
    }

    function saveToLocalStorage(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function downloadJson(data, fileName) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function loadData() {
      setStatus("Loading game data...");
      const warnings = [];

      const local = tryLoadFromLocalStorage();
      if (local) {
        gameData = local;
        renderChoiceRoutes();
        setStatus("Loaded from browser override.", "ok");
        return;
      }

      try {
        gameData = await tryLoadFromApi();
      } catch (apiErr) {
        warnings.push(apiErr.message);
      }

      if (!gameData) {
        try {
          gameData = await tryLoadFromStaticJson();
        } catch (staticErr) {
          warnings.push(staticErr.message);
        }
      }

      if (!gameData) {
        throw new Error(`Could not load data. ${warnings.join(" | ")}`);
      }

      renderChoiceRoutes();
      if (warnings.length) {
        setStatus(`Loaded with fallback. ${warnings.join(" | ")}`, "err");
      } else {
        setStatus("Loaded.", "ok");
      }
    }

    async function saveData() {
      setStatus("Saving override...");
      saveToLocalStorage(gameData);

      let apiSaved = false;
      try {
        const res = await fetch("/api/game-data", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(gameData),
        });
        apiSaved = res.ok;
      } catch {
        apiSaved = false;
      }

      if (apiSaved) {
        setStatus("Saved to browser override and server API.", "ok");
      } else {
        setStatus("Saved to browser override only. Export JSON to publish changes.", "ok");
      }
    }

    function importJsonFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || "{}"));
          if (!hasRequiredKeys(parsed)) {
            setStatus("Import failed: JSON missing required keys.", "err");
            return;
          }
          gameData = parsed;
          renderChoiceRoutes();
          saveToLocalStorage(gameData);
          setStatus("Imported and saved to browser override.", "ok");
        } catch {
          setStatus("Import failed: invalid JSON file.", "err");
        }
      };
      reader.readAsText(file);
    }

    document.getElementById("reload-btn").addEventListener("click", () => {
      loadData().catch((e) => setStatus(e.message, "err"));
    });

    document.getElementById("export-btn").addEventListener("click", () => {
      if (!gameData) {
        setStatus("Nothing to export yet.", "err");
        return;
      }
      downloadJson(gameData, "game_data.json");
      setStatus("Exported game_data.json", "ok");
    });

    document.getElementById("import-btn").addEventListener("click", () => {
      document.getElementById("import-file").click();
    });

    document.getElementById("import-file").addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) importJsonFile(file);
      e.target.value = "";
    });

    document.getElementById("save-btn").addEventListener("click", () => {
      saveData().catch((e) => setStatus(e.message, "err"));
    });

    loadData().catch((e) => setStatus(e.message, "err"));
  </script>
</body>
</html>
